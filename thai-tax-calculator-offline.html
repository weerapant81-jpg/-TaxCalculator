<body>
<div id="app"></div>

<!-- PDF print page (hidden until print) -->
<div class="pdf-page" id="pdf-page"></div>

<script>
var N={900:"#0a1628",800:"#0f2044",700:"#162c5e",600:"#1e3a78",500:"#2251a3",400:"#3b6fd4",300:"#6b9ee8",200:"#b8d0f5",100:"#deeafc",50:"#f0f5fd",gold:"#e2ac3a"};

var BRACKETS=[
  {min:0,max:150000,rate:0},{min:150000,max:300000,rate:0.05},
  {min:300000,max:500000,rate:0.10},{min:500000,max:750000,rate:0.15},
  {min:750000,max:1000000,rate:0.20},{min:1000000,max:2000000,rate:0.25},
  {min:2000000,max:5000000,rate:0.30},{min:5000000,max:9999999999,rate:0.35}
];

function calcTax(inc){var t=0;for(var i=0;i<BRACKETS.length;i++){var b=BRACKETS[i];if(inc<=b.min)break;t+=(Math.min(inc,b.max)-b.min)*b.rate;}return Math.max(0,t);}
function getMR(ni){var r=0;for(var i=0;i<BRACKETS.length;i++){if(ni>BRACKETS[i].min)r=BRACKETS[i].rate;}return r*100;}
function fmt(n){return new Intl.NumberFormat("th-TH",{maximumFractionDigits:2}).format(n);}
function fmtB(n){if(n>=1000000)return fmt(n/1000000)+" ล.";if(n>=1000)return fmt(n/1000)+" พัน";return fmt(n);}

var DEFAULT={salary:0,bonus:0,income40_2:0,income40_3:0,interest:0,dividend:0,
  prof40_6:0,prof40_6type:"other",income40_7:0,rental:0,other40:0,
  maritalStatus:"single",spouseIncome:false,children:0,parents:0,disabled:0,
  lifeIns:0,healthIns:0,parentHealthIns:0,socialSec:0,
  rmf:0,annuityIns:0,pvd:0,govPension:0,nsf:0,thaiesg:0,
  mortgage:0,easyReceipt:0,shopDee:0,otop:0,donation:0,eduDonation:0,politicalDonate:0,newHome:0,
  prepaid:0,s1:true,s2:true,s3:true,s4:true,s5:true};

var S={};
for(var k in DEFAULT)S[k]=DEFAULT[k];

function compute(){
  var s=S;
  // รายได้แต่ละมาตรา
  var ti40_1 = s.salary + s.bonus;
  var ti40_2 = s.income40_2;
  var ti40_3 = s.income40_3;
  var ti40_4 = s.interest + s.dividend;
  var ti40_6 = s.prof40_6;
  var ti40_7 = s.income40_7;
  var ti40_5 = s.rental;
  var ti40_8 = s.other40;
  var ti = ti40_1 + ti40_2 + ti40_3 + ti40_4 + ti40_6 + ti40_7 + ti40_5 + ti40_8;

  // ค่าใช้จ่าย
  // 40(1)+40(2)+40(3) รวมกัน 50% ไม่เกิน 100,000
  var exp_123 = Math.min((ti40_1 + ti40_2 + ti40_3) * 0.50, 100000);
  // 40(4) หักไม่ได้
  var exp_4 = 0;
  // 40(5) เช่า 30%
  var exp_5 = ti40_5 * 0.30;
  // 40(6) แพทย์ 60%, อื่นๆ 40%
  var exp_6 = s.prof40_6type === "doctor" ? ti40_6 * 0.60 : ti40_6 * 0.40;
  // 40(7) รับเหมา 60%
  var exp_7 = ti40_7 * 0.60;
  // 40(8) อื่นๆ 60%
  var exp_8 = ti40_8 * 0.60;
  var expD = exp_123 + exp_4 + exp_5 + exp_6 + exp_7 + exp_8;

  var selfD=60000,spouseD=(s.maritalStatus==="married"&&!s.spouseIncome)?60000:0;
  var childD=Math.min(s.children,3)*30000,parentD=s.parents*30000,disD=s.disabled*60000;
  var perD=selfD+spouseD+childD+parentD+disD;
  var lifeD=Math.min(s.lifeIns,100000),hlthD=Math.min(s.healthIns,25000),phD=Math.min(s.parentHealthIns,15000),ssD=Math.min(s.socialSec,10500);
  var insD=Math.min(lifeD+hlthD,100000)+phD+ssD;
  var net1=ti-expD;
  var rmfR=Math.min(s.rmf,net1*0.30),annR=Math.min(s.annuityIns,Math.min(net1*0.15,200000));
  var pvdR=Math.min(s.pvd,500000),govR=Math.min(s.govPension,500000),nsfR=Math.min(s.nsf,30000);
  var gRaw=rmfR+annR+pvdR+govR+nsfR,gCap=500000,rat=gRaw>gCap?gCap/gRaw:1;
  var rmfD=rmfR*rat,annD=annR*rat,pvdD=pvdR*rat,govD=govR*rat,nsfD=nsfR*rat;
  var esgD=Math.min(s.thaiesg,Math.min(net1*0.30,300000));
  var savD=rmfD+annD+pvdD+govD+nsfD+esgD;
  var spendD=Math.min(s.mortgage,100000)+Math.min(s.easyReceipt,50000)+Math.min(s.shopDee,50000)+Math.min(s.otop,10000)+Math.min(s.donation*2,net1*0.10)+Math.min(s.eduDonation,net1*0.10)+Math.min(s.politicalDonate,10000)+Math.min(s.newHome*0.005,100000);
  var allD=expD+perD+insD+savD+spendD;
  var ni=Math.max(0,ti-allD),tax=calcTax(ni);
  var netTax=Math.max(0,tax-s.prepaid);
  var eff=ti>0?(tax/ti)*100:0;
  return {ti:ti,ti40_1:ti40_1,ti40_2:ti40_2,ti40_3:ti40_3,ti40_4:ti40_4,ti40_6:ti40_6,ti40_7:ti40_7,ti40_5:ti40_5,ti40_8:ti40_8,
    expD:expD,exp_123:exp_123,exp_5:exp_5,exp_6:exp_6,exp_7:exp_7,exp_8:exp_8,
    perD:perD,insD:insD,savD:savD,spendD:spendD,allD:allD,ni:ni,tax:tax,netTax:netTax,
    eff:eff,mr:getMR(ni),mth:netTax/12,
    selfD:selfD,spouseD:spouseD,childD:childD,parentD:parentD,disD:disD,
    lifeD:lifeD,hlthD:hlthD,phD:phD,ssD:ssD,
    rmfD:rmfD,annD:annD,pvdD:pvdD,govD:govD,nsfD:nsfD,esgD:esgD,
    gRaw:gRaw,gCap:gCap,net1:net1};
}

function genAdvice(c){
  var s=S, items=[], net1=c.net1;
  // ประกันชีวิต
  var lifeRoom=100000-s.lifeIns;
  if(lifeRoom>0){var save=calcTax(c.ni)-calcTax(Math.max(0,c.ni-Math.min(lifeRoom,100000)));if(save>0)items.push({icon:"🛡️",title:"ประกันชีวิต / ประกันออมทรัพย์",text:"สามารถซื้อเพิ่มได้อีก ฿"+fmt(lifeRoom)+" (เหลือเพดาน 100,000)",save:save});}
  // ประกันสุขภาพ
  var hlthRoom=25000-s.healthIns;
  if(hlthRoom>0){var save2=calcTax(c.ni)-calcTax(Math.max(0,c.ni-Math.min(hlthRoom,25000)));if(save2>0)items.push({icon:"❤️",title:"ประกันสุขภาพ",text:"สามารถซื้อเพิ่มได้อีก ฿"+fmt(hlthRoom)+" (เหลือเพดาน 25,000)",save:save2});}
  // ประกันสังคม
  var ssRoom=10500-s.socialSec;
  if(ssRoom>0){var save3=calcTax(c.ni)-calcTax(Math.max(0,c.ni-ssRoom));if(save3>0)items.push({icon:"👷",title:"ประกันสังคม",text:"สามารถเพิ่มได้อีก ฿"+fmt(ssRoom)+" (เหลือเพดาน 10,500)",save:save3});}
  // RMF+กลุ่ม 500k
  var groupUsed=c.gRaw,groupRoom=Math.max(0,500000-groupUsed);
  var rmfMax=Math.min(net1*0.30,500000-groupUsed);
  if(rmfMax>s.rmf&&rmfMax>0){var addRmf=rmfMax-s.rmf;var save4=calcTax(c.ni)-calcTax(Math.max(0,c.ni-Math.min(addRmf*c.gRaw>c.gCap?c.gCap/c.gRaw:1,addRmf)));if(save4>0)items.push({icon:"📈",title:"กองทุน RMF",text:"สามารถซื้อเพิ่มได้อีก ฿"+fmt(addRmf)+" (RMF+กลุ่มเหลือ ฿"+fmt(groupRoom)+")",save:save4});}
  // ประกันบำนาญ
  var annMax=Math.min(net1*0.15,200000,Math.max(0,500000-groupUsed));
  if(annMax>s.annuityIns&&annMax>0){var addAnn=annMax-s.annuityIns;var save5=calcTax(c.ni)-calcTax(Math.max(0,c.ni-addAnn));if(save5>0)items.push({icon:"🏦",title:"ประกันบำนาญ",text:"สามารถซื้อเพิ่มได้อีก ฿"+fmt(addAnn)+" (เหลือเพดาน 200,000 หรือ 15%)",save:save5});}
  // Thai ESG
  var esgMax=Math.min(net1*0.30,300000),esgRoom=esgMax-s.thaiesg;
  if(esgRoom>0){var save6=calcTax(c.ni)-calcTax(Math.max(0,c.ni-esgRoom));if(save6>0)items.push({icon:"🌿",title:"กองทุน Thai ESG",text:"สามารถซื้อเพิ่มได้อีก ฿"+fmt(esgRoom)+" (เหลือเพดาน 300,000 หรือ 30%)",save:save6});}
  // ดอกเบี้ยบ้าน
  var mortRoom=100000-s.mortgage;
  if(mortRoom>0)items.push({icon:"🏠",title:"ดอกเบี้ยกู้ยืมซื้อบ้าน",text:"ยังสามารถนำดอกเบี้ยมาลดหย่อนได้อีก ฿"+fmt(mortRoom)+" (เหลือเพดาน 100,000)",save:0});
  // Easy e-Receipt
  var erRoom=50000-s.easyReceipt;
  if(erRoom>0){var save7=calcTax(c.ni)-calcTax(Math.max(0,c.ni-erRoom));if(save7>0)items.push({icon:"🧾",title:"Easy e-Receipt 2569",text:"สามารถใช้จ่ายเพิ่มได้อีก ฿"+fmt(erRoom)+" (เหลือเพดาน 50,000)",save:save7});}
  // บริจาค
  var donMax=Math.min(net1*0.10/2,net1*0.05),donRoom=donMax-s.donation;
  if(donRoom>0){var save8=calcTax(c.ni)-calcTax(Math.max(0,c.ni-donRoom*2));if(save8>0)items.push({icon:"❤️‍🔥",title:"บริจาคทั่วไป",text:"สามารถบริจาคเพิ่มได้อีก ฿"+fmt(donRoom)+" (ยกเว้น 2 เท่า เหลือเพดาน 10% ของเงินได้สุทธิ)",save:save8});}
  return items;
}

function inp(key,label,sub,note){
  return '<div class="ig"><div class="itop"><label class="ilbl">'+label+'</label>'+(sub?'<span class="isub">'+sub+'</span>':'')+
    '</div><div class="iwrp"><span class="ipfx">฿</span><input class="inp" type="number" min="0" data-key="'+key+'" value="'+S[key]+'"/></div>'+
    (note?'<p class="inote">'+note+'</p>':'')+
  '</div>';
}
function chips(key,label,opts){
  var btns=opts.map(function(o){var on=String(S[key])===String(o.v);return '<button class="chip'+(on?' on':'')+'" data-key="'+key+'" data-val="'+o.v+'">'+o.l+'</button>';}).join('');
  return '<div class="ig"><label class="ilbl">'+label+'</label><div class="chips">'+btns+'</div></div>';
}
function sec(sk,icon,title,ac,body){
  var open=S[sk];
  return '<div class="card"><button class="chdr'+(open?' open':'')+'" data-sec="'+sk+'">'+
    '<span class="cion" style="background:'+ac+'22">'+icon+'</span><span class="ctit">'+title+'</span>'+
    '<span class="carr" style="-webkit-transform:'+(open?'rotate(180deg)':'rotate(0deg)')+';transform:'+(open?'rotate(180deg)':'rotate(0deg)')+'">▼</span>'+
  '</button>'+(open?'<div class="cbdy">'+body+'</div>':'')+
  '</div>';
}
function gauge(lbl,val,tot,col){
  var pct=tot>0?Math.min(100,(val/tot)*100):0;
  return '<div class="gauge"><div class="gtop"><span class="glbl">'+lbl+'</span><span class="gval">฿'+fmt(val)+'</span></div><div class="gtrk"><div class="gfil" style="width:'+pct+'%;background:'+col+'"></div></div></div>';
}

function doReset(){
  for(var k in DEFAULT)S[k]=DEFAULT[k];
  render();
}

function doPrint(){
  window.print();
}

function bindEvents(){
  var inputs=document.querySelectorAll(".inp");
  for(var i=0;i<inputs.length;i++){
    (function(el){
      el.addEventListener("change",function(){S[el.dataset.key]=Math.max(0,Number(el.value)||0);render();});
      el.addEventListener("focus",function(){el.style.borderColor="#3b6fd4";});
      el.addEventListener("blur",function(){el.style.borderColor="#deeafc";});
    })(inputs[i]);
  }
  var cps=document.querySelectorAll(".chip");
  for(var j=0;j<cps.length;j++){
    (function(el){
      el.addEventListener("click",function(){
        var k=el.dataset.key,raw=el.dataset.val;
        if(raw==="true")S[k]=true;
        else if(raw==="false")S[k]=false;
        else if(!isNaN(Number(raw)))S[k]=Number(raw);
        else S[k]=raw;
        render();
      });
    })(cps[j]);
  }
  var secs=document.querySelectorAll("[data-sec]");
  for(var k=0;k<secs.length;k++){
    (function(el){el.addEventListener("click",function(){S[el.dataset.sec]=!S[el.dataset.sec];render();});})(secs[k]);
  }
  var pp=document.getElementById("prepaid-inp");
  if(pp){pp.addEventListener("change",function(){S.prepaid=Math.max(0,Number(this.value)||0);render();});}
  var br=document.getElementById("btn-reset");
  if(br){br.addEventListener("click",doReset);}
  var bs=document.getElementById("btn-save");
  if(bs){bs.addEventListener("click",doPrint);}
}

render();
</script>
